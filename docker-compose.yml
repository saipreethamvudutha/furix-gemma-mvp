# ╔════════════════════════════════════════════════════════════════════════════╗
# ║  FURIX — all 15 containers (close-to-real-world deployment)                 ║
# ╠════════════════════════════════════════════════════════════════════════════╣
# ║  This is the "real" mode: 15 actual containers on one Docker network, the   ║
# ║  7 Furix-built services sharing ONE image (different role per container)    ║
# ║  and talking over a real Kafka bus. The lite mode (./run.sh) collapses all  ║
# ║  of this into a single process — same code, no infra. Start here to LEARN   ║
# ║  the shape; run lite to iterate fast.                                       ║
# ║                                                                              ║
# ║    docker compose up --build                                                ║
# ║    open http://localhost:8080         (via C1 nginx → C11 dashboard)        ║
# ╚════════════════════════════════════════════════════════════════════════════╝

# Shared env for every Furix-built service (DRY via a YAML anchor).
x-furix-env: &furix-env
  BUS_BACKEND: kafka
  KAFKA_BROKERS: c5-kafka:9092
  VALKEY_URL: redis://c13-valkey:6379/0
  CLICKHOUSE_URL: clickhouse://default@c10-clickhouse:9000/default
  PG_HOST: c9-postgres
  PG_PORT: "5432"
  PG_DBNAME: cis_rag
  PG_USER: colab_user
  PG_PASSWORD: colab_pass
  RAG_ENABLED: "1"
  # C7: point at YOUR Gemma server in production. Default uses the c7-gemma box.
  GEMMA_BASE_URL: http://c7-gemma:11434/v1
  GEMMA_MODEL: gemma4:e4b
  MOCK_LLM: "0"

x-furix-build: &furix-build
  build: { context: ., dockerfile: deploy/Dockerfile }

services:

  # ── C1 · NGINX — TLS edge / the only door in ──────────────────────────────
  c1-nginx:
    image: nginx:1.27-alpine
    ports: ["8080:80"]
    volumes: ["./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro"]
    depends_on: [c11-dashboard]

  # ── C2 · VECTOR — log ingestion front door ────────────────────────────────
  c2-vector:
    image: timberio/vector:0.39.0-debian
    volumes: ["./deploy/vector/vector.toml:/etc/vector/vector.toml:ro"]
    depends_on: [c5-kafka]

  # ── C3 · SCAN ENGINE (Furix service) ──────────────────────────────────────
  c3-scan:
    <<: *furix-build
    command: ["python", "-m", "furix_mvp.run_container", "scan"]
    environment: *furix-env
    depends_on: [c5-kafka]

  # ── C4 · INTEL SYNC (Furix service) ───────────────────────────────────────
  c4-intel:
    <<: *furix-build
    command: ["python", "-m", "furix_mvp.run_container", "intel"]
    environment: *furix-env
    depends_on: [c5-kafka, c13-valkey]

  # ── C5 · KAFKA (KRaft, single broker) — the bus ───────────────────────────
  c5-kafka:
    image: apache/kafka:3.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://c5-kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@c5-kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── C6 · NORMALISER (Furix service) ───────────────────────────────────────
  c6-normaliser:
    <<: *furix-build
    command: ["python", "-m", "furix_mvp.run_container", "normaliser"]
    environment: *furix-env
    depends_on: [c5-kafka, c4-intel]

  # ── C7 · GEMMA (vLLM/Ollama) — the model under test ───────────────────────
  # In production, DELETE this service and point GEMMA_BASE_URL at your server.
  c7-gemma:
    image: ollama/ollama:latest
    volumes: ["gemma-models:/root/.ollama"]
    # Pull/run your model once: `docker compose exec c7-gemma ollama pull gemma4:e4b`

  # ── C8 · STORAGE + DETECTION (Furix service) ──────────────────────────────
  c8-storage:
    <<: *furix-build
    command: ["python", "-m", "furix_mvp.run_container", "storage"]
    environment: *furix-env
    depends_on: [c5-kafka, c9-postgres, c10-clickhouse]

  # ── C9 · POSTGRESQL + pgvector (+AGE optional) — knowledge graph ───────────
  c9-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cis_rag
      POSTGRES_USER: colab_user
      POSTGRES_PASSWORD: colab_pass
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  # ── C10 · CLICKHOUSE — event timeline ─────────────────────────────────────
  c10-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ulimits: { nofile: { soft: 262144, hard: 262144 } }
    volumes: ["ch-data:/var/lib/clickhouse"]

  # ── C11 · DASHBOARD (Furix service) — web UI + API ────────────────────────
  c11-dashboard:
    <<: *furix-build
    command: ["python", "-m", "furix_mvp.run_container", "dashboard"]
    environment:
      <<: *furix-env
      FURIX_BOOTSTRAP: "0"   # dedicated containers run the bus; UI just serves
    depends_on: [c5-kafka, c9-postgres, c10-clickhouse, c13-valkey]

  # ── C12 · PROMETHEUS — scrapes /api/metrics ───────────────────────────────
  c12-prometheus:
    image: prom/prometheus:v2.53.0
    volumes: ["./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]
    depends_on: [c11-dashboard]

  # ── C13 · VALKEY — cache / sessions / verdict cache ───────────────────────
  c13-valkey:
    image: valkey/valkey:8-alpine
    volumes: ["valkey-data:/data"]

  # ── C14 · AI BRAIN (Furix service) — orchestrator, calls C7 ───────────────
  c14-ai-brain:
    <<: *furix-build
    command: ["python", "-m", "furix_mvp.run_container", "ai_brain"]
    environment: *furix-env
    depends_on: [c5-kafka, c7-gemma, c9-postgres, c13-valkey]

  # ── C15 · BACKUP COORDINATOR (Furix service) ──────────────────────────────
  c15-backup:
    <<: *furix-build
    command: ["python", "-m", "furix_mvp.run_container", "backup"]
    environment: *furix-env
    volumes: ["./backups:/app/backups"]
    depends_on: [c9-postgres, c10-clickhouse, c13-valkey]

volumes:
  pg-data:
  ch-data:
  valkey-data:
  gemma-models:
