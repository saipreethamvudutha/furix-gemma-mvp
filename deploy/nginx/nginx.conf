# CONTAINER C1 · NGINX — the only door into the appliance.
# Terminates client connections and reverse-proxies everything to C11 Dashboard.
# Real deployment adds TLS (listen 443 ssl) + rate limiting; kept minimal here.
upstream dashboard { server c11-dashboard:8080; }

server {
    listen 80;
    server_name _;

    # Health for an external monitor / load balancer.
    location /healthz { return 200 "ok\n"; }

    # Everything else → the dashboard (UI + /api/*). One choke point for authz.
    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;            # AI analyses can be slow under load
    }
}
